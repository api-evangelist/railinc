aid: railinc
name: Railinc
description: >-
  Railinc, a wholly owned subsidiary of the Association of American Railroads,
  delivers IT and information services to the North American freight rail industry.
  Railinc's suite of APIs empowers customers to simplify and automate business
  processes essential to the lifecycle of freight rail operations.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Rail
  - Freight
  - Logistics
  - Transportation
  - Supply Chain
url: >-
