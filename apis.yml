apis:
  - aid: railinc:api-portal
    name: Railinc API Portal
    description: >-
      Railinc's suite of APIs empowers customers to simplify and automate business
      processes essential to the lifecycle of freight rail operations, including
      equipment, shipment, asset health, and routing data.
    humanURL: https://public.railinc.com/
    tags:
      - Freight Rail
      - Equipment
      - Shipments
    properties:
      - type: Documentation
        url: https://public.railinc.com/
  - aid: railinc:asset-health-api
    name: Railinc Asset Health API Portal
    description: >-
      Asset Health API Portal enabling electronic transmission of damaged and
      defective car tracking data and equipment health information across rail
      industry partners.
    humanURL: https://public.railinc.com/
    tags:
      - Asset Health
      - Equipment
      - EHMS
    properties:
      - type: Documentation
        url: https://public.railinc.com/
  - aid: railinc:rigis
    name: RIGIS Routing and Mileage API
    description: >-
      RIGIS Routing + Mileage provides both a User Interface and Application
      Programming Interface delivering authoritative North American railroad
      routing and mileage data updated quarterly.
    humanURL: https://public.railinc.com/
    tags:
      - Routing
      - Mileage
      - RIGIS
    properties:
      - type: Documentation
        url: https://public.railinc.com/
